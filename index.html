<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unbox a Star - Prototype</title>
<style>
body { font-family: sans-serif; text-align: center; background: #f0f8ff; margin: 0; padding: 0; }
h1 { color: #ff4500; margin-top: 20px; }
#menu { display: flex; justify-content: space-between; align-items: center; position: fixed; top:0; width: 100%; background: #ddd; padding: 10px; box-sizing: border-box; }
.menu-left { display: flex; align-items: center; }
.menu-left img { width: 40px; height:40px; border-radius:50%; margin-right:10px; }
.menu-button { flex: 1; margin: 0 5px; padding: 10px 0; background: #fff; border-radius: 10px; cursor: pointer; border: 2px solid #000; }
.menu-button:hover { background: #ffe4b5; }
#home-section, #index-section, #profile-section, #options-section, #friends-section { display:none; margin-top:60px; }
#pack-container { width:220px; height:260px; margin:40px auto; background:#fff; display:flex; justify-content:center; align-items:center; border:2px solid #000; border-radius:10px; }
#pack-img { max-width:200px; max-height:200px; cursor:pointer; }
#openBooster { display:none; margin-top:10px; }
.card-single { width:200px; height:300px; margin:20px auto; background:#fff; border:2px solid #000; border-radius:10px; display:flex; justify-content:center; align-items:center; cursor:pointer; font-size:24px; }
.card-single.reveal { animation: pulse 0.5s; }
@keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.2);} 100% {transform: scale(1);} }
#index { margin-top: 20px; max-height: 70vh; overflow-y: auto; display: flex; flex-wrap: wrap; justify-content: center; }
.index-card { display: inline-block; width: 60px; height: 90px; margin: 3px; background: #ddd; border-radius: 6px; overflow: hidden; position: relative; }
.found { background: #90ee90; }
.duplicates { position: absolute; bottom: 0; right: 0; background: rgba(255,255,255,0.7); padding: 2px 4px; border-radius: 4px; font-size: 12px; }
img { width: 100%; height: 100%; object-fit: contain; }
</style>
</head>
<body>

<div id="menu">
  <div class="menu-left">
    <img id="menu-pdp" src="#" alt="PDP" style="display:none;">
    <span id="menu-name"></span>
  </div>
  <div class="menu-button" data-section="home-section">Accueil</div>
  <div class="menu-button" data-section="index-section">Index</div>
  <div class="menu-button" data-section="options-section">Options</div>
  <div class="menu-button" data-section="friends-section">Amis</div>
  <div class="menu-button" data-section="profile-section">Profil</div>
</div>

<h1>Unbox a Star</h1>

<div id="home-section">
  <div id="booster-timer" style="margin-top:10px;font-weight:bold;"></div>
  <div id="pack-container">
    <img id="pack-img" src="https://via.placeholder.com/200x200/FFFFFF/000000?text=Pack" alt="Pack">
  </div>
  <button id="openBooster">Ouvrir le booster</button>
  <div id="card-display"></div>
</div>

<div id="index-section">
<h2>Index</h2>
<div id="index"></div>
</div>

<div id="profile-section">
<h2>Profil</h2>
<label>Nom: <input type="text" id="profile-name" placeholder="Votre nom"></label><br><br>
<label>PPD: <input type="file" id="profile-pdp-file"></label><br><br>
Code ami: <span id="friend-code-display"></span>
<img id="profile-pdp-preview" src="#" alt="Preview" style="width:80px;height:80px;border:1px solid #000;display:none;margin-top:10px;">
</div>

<div id="options-section">
<h2>Options</h2>
<div id="stats"></div>
<button id="resetData">Réinitialiser les données</button>
</div>

<div id="friends-section">
<h2>Amis</h2>
<input placeholder="Entrer code ami">
</div>

<script>
document.addEventListener('DOMContentLoaded',()=>{

const characters = (()=>{

const commonNames = [
"Lutin Vert","Princesse Douce","Aspirateur Fou","Lit Magique","Chien Joueur","Chat Noir","Grenouille Verte","Licorne Mini","Robot Jouet","Poulet Rigolo",
"Blob Rose","Pierre Vivante","Gobelin Gentil","Rat Rapide","Champi Rouge","Boule Poil","Mini Dragon","Bébé Slime","Pingouin Cool","Cactus Punk",
"Nuage Blanc","Ver Ninja","Poisson Cube","Tortue Zen","Bâton Rune","Bulle Magique","Chaussette Folle","Cube Sourire","Escargot Turbo","Lapin Marteau",
"Poussin Pixel","Mouton Nuage","Gnome Barbu","Grenouille Beat","Robot Boite","Crabe Rouge","Mini Ogre","Biscuit Vivant","Dino Peluche","Plume Foudre",
"Flamme Mini","Kraken Bébé","Mousse Verte","Chou Mutant","Souris Mage","Boule Neige","Peluche Mage","Lama Laser","Panda Zen","Pomme Bombe",
"Brique Runique","Alien Bébé","Corbeau Rune","Renard Futé","Poire Pirate","Piment Flash","Canard Geek","Ours Mini","Miel Gluant","Cloche Rune",
"Fleur Magique","Ombre Douce","Porte Vivante","Livre Magique","Clown Pixel","Cube Lave","Sablier Fou","Carotte Ninja","Corde Rune","Boule Disco",
"Mini Requin","Tigre Peluche","Nuage Noir","Goutte Bleue","Foudre Mini","Lutin Pixel","Zombie Bébé","Boule Plasma","Bonbon Skull","Crabe Disco"
];

const rareNames = [
"Sorcière Verte","Chevalier Bois","Dragon Rouge","Spectre Bleu","Mage Sable","Robot Lame","Alien Rune","Pirate Vapeur","Loup Argent","Phoenix Cendre",
"Démon Sourire","Samouraï Pixel","Golem Roche","Hydre Jeune","Fantôme Lune","Oracle Brume","Chasseur Ombre","Ninja Brillant","Guerrier Rune","Sirène Onde",
"Titan Petit","Berserker Bois","Faucon Rune","Paladin Jade","Serpent Glace","Djinn Mini","Valkyrie Rose","Roi Slime","Prince Ombre","Archer Étoile",
"Clerc Sombre","Gladiateur Pixel","Moine Lave","Barde Rune","Voyant Ciel","Assassin Vapeur","Chimère Douce","Gardien Rune","Mage Plasma","Oracle Nuit",
"Dragon Fleur","Reine Brume","Templier Argent","Esprit Jade","Seigneur Vent"
];

const superNames = [
"Dragon Noir","Archimage","Titan Acier","Spectre Royal","Reine Araignée","Démon Lame","Phoenix Bleu","Hydre Royale","Golem Antique","Kraken Profond",
"Samouraï Spectral","Ange Rune","Valkyrie Nuit","Liche Éternelle","Berserker Feu","Oracle Doré","Chevalier Spectre","Séraphin Rune","Empereur Slime","Gardien Galaxie"
];

const ultraNames = [
"Dragon Cosmique","Dieu Slime","Titan Galactique","Ange Absolu","Démon Originel","Hydre Cosmique","Phantom Prime","Roi Astral","Kraken Stellaire","Oracle Ultime"
];

const secretNames = ["Entité Vide","Alpha Zero","Spectre Origin","Dragon Infini"];
const goldNames = ["Dieu Créateur"];

const list=[];
commonNames.forEach(n=>list.push({name:n,img:`https://via.placeholder.com/80x120/FFFFFF/000000?text=${encodeURIComponent(n)}`,rarity:1}));
rareNames.forEach(n=>list.push({name:n,img:`https://via.placeholder.com/80x120/FFFF00/000000?text=${encodeURIComponent(n)}`,rarity:2}));
superNames.forEach(n=>list.push({name:n,img:`https://via.placeholder.com/80x120/FFA500/000000?text=${encodeURIComponent(n)}`,rarity:3}));
ultraNames.forEach(n=>list.push({name:n,img:`https://via.placeholder.com/80x120/FF00FF/000000?text=${encodeURIComponent(n)}`,rarity:4}));
secretNames.forEach(n=>list.push({name:n,img:`https://via.placeholder.com/80x120/FF0000/FFFFFF?text=${encodeURIComponent(n)}`,rarity:5}));
goldNames.forEach(n=>list.push({name:n,img:`https://via.placeholder.com/80x120/FFD700/000000?text=${encodeURIComponent(n)}`,rarity:6}));

return list;
})();

let collection=JSON.parse(localStorage.getItem('collection'))||{};
let friendCode=localStorage.getItem('friendCode');
if(!friendCode){friendCode=Math.random().toString(36).substring(2,8).toUpperCase();localStorage.setItem('friendCode',friendCode);} 
document.getElementById('friend-code-display').innerText=friendCode;

function updateProfileMenu(){
  const name=document.getElementById('profile-name').value;
  const pdp=document.getElementById('profile-pdp-preview').src;
  if(name) document.getElementById('menu-name').innerText=name;
  if(document.getElementById('profile-pdp-preview').style.display!=='none') {
    document.getElementById('menu-pdp').src=pdp;
    document.getElementById('menu-pdp').style.display='inline-block';
  }
}

function save(){localStorage.setItem('collection',JSON.stringify(collection));}
function updateStats(){
  let total=0,dup=0,idx=0;
  characters.forEach(c=>{if(collection[c.name]){idx++;total+=collection[c.name];if(collection[c.name]>1)dup+=collection[c.name]-1;}});
  document.getElementById('stats').innerText=`Total: ${total} | Doublons: ${dup} | Index: ${idx}/${characters.length}`;
}

function updateIndex(){
  const div=document.getElementById('index');
  div.innerHTML='';
  const sorted=[...characters].sort((a,b)=>a.rarity-b.rarity);
  sorted.forEach(c=>{
    let d=document.createElement('div');
    d.className='index-card';
    d.title=c.name;
    if(collection[c.name]){
      d.classList.add('found');
      d.innerHTML=`<img src='${c.img}'>`;
      if(collection[c.name]>1) d.innerHTML+=`<div class='duplicates'>x${collection[c.name]}</div>`;
    }
    div.appendChild(d);
  });
}

function getBoosters(){
  const now=Date.now();
  let boosters=JSON.parse(localStorage.getItem('boosters'))||{count:3,last:now};

  const diff=now-boosters.last;
  if(diff>=43200000){
    const add=Math.floor(diff/43200000);
    boosters.count=Math.min(3,boosters.count+add);
    boosters.last+=add*43200000;
    localStorage.setItem('boosters',JSON.stringify(boosters));
  }
  return boosters;
}

function updateBoosterTimer(){
  const boosters=getBoosters();
  const timerDiv=document.getElementById('booster-timer');

  if(boosters.count>=3){
    timerDiv.innerText="Boosters pleins";
    return;
  }

  const next=boosters.last+43200000;
  const remain=next-Date.now();

  const h=Math.floor(remain/3600000);
  const m=Math.floor((remain%3600000)/60000);
  const s=Math.floor((remain%60000)/1000);

  timerDiv.innerText=`Prochain booster: ${h}h ${m}m ${s}s`;
}

setInterval(updateBoosterTimer,1000);

function drawBooster(){
  let boosters=getBoosters();
  if(boosters.count<=0){alert("Plus de booster");return;}

  boosters.count--;
  localStorage.setItem('boosters',JSON.stringify(boosters));

  const boosterCards=[];
  for(let i=0;i<10;i++){
    const r=Math.random()*100;
    let pool;
    if(r<70) pool=characters.filter(c=>c.rarity===1);
    else if(r<87) pool=characters.filter(c=>c.rarity===2);
    else if(r<97) pool=characters.filter(c=>c.rarity===3);
    else if(r<99) pool=characters.filter(c=>c.rarity===4);
    else if(r<99.99) pool=characters.filter(c=>c.rarity===5);
    else pool=characters.filter(c=>c.rarity===6);
    boosterCards.push(pool[Math.floor(Math.random()*pool.length)]);
  }

  let current=0;
  const cardDisplay=document.getElementById('card-display');
  cardDisplay.innerHTML='';

  function showNext(){
    if(current>=boosterCards.length){updateBoosterTimer();return;}
    const card=boosterCards[current];
    const div=document.createElement('div');
    div.className='card-single';
    if(!collection[card.name]) div.classList.add('reveal');

    div.innerHTML=`<div><img src='${card.img}'><p>${card.name}<br>Rareté: ${card.rarity}</p></div>`;

    div.onclick=()=>{
      collection[card.name]=(collection[card.name]||0)+1;
      save(); updateIndex(); updateStats();
      current++; cardDisplay.innerHTML=''; showNext();
    };

    cardDisplay.appendChild(div);
  }

  showNext();
}
  const boosterCards=[];
  for(let i=0;i<10;i++){
    const r=Math.random()*100;
    let pool;
    if(r<70) pool=characters.filter(c=>c.rarity===1);
    else if(r<87) pool=characters.filter(c=>c.rarity===2);
    else if(r<97) pool=characters.filter(c=>c.rarity===3);
    else if(r<99) pool=characters.filter(c=>c.rarity===4);
    else if(r<99.99) pool=characters.filter(c=>c.rarity===5);
    else pool=characters.filter(c=>c.rarity===6);
    boosterCards.push(pool[Math.floor(Math.random()*pool.length)]);
  }

  let current=0;
  const cardDisplay=document.getElementById('card-display');
  cardDisplay.innerHTML='';
  function showNext(){
    if(current>=boosterCards.length) return;
    const card=boosterCards[current];
    const div=document.createElement('div');
    div.className='card-single';
    if(!collection[card.name]) div.classList.add('reveal');
    div.innerHTML=`<div><img src='${card.img}'><p>${card.name}<br>Rareté: ${card.rarity}</p></div>`;
    div.addEventListener('click',()=>{
      collection[card.name]=(collection[card.name]||0)+1;
      save(); updateIndex(); updateStats(); current++; cardDisplay.innerHTML=''; showNext();
    });
    cardDisplay.appendChild(div);
  }
  showNext();
}

document.getElementById('pack-img').addEventListener('click',()=>{document.getElementById('openBooster').style.display='inline-block';});
document.getElementById('openBooster').addEventListener('click',drawBooster);

const sections=['home-section','index-section','profile-section','options-section','friends-section'];
document.querySelectorAll('.menu-button').forEach(btn=>btn.addEventListener('click',()=>{
  sections.forEach(s=>document.getElementById(s).style.display='none');
  document.getElementById(btn.dataset.section).style.display='block';
}));

document.getElementById('resetData').addEventListener('click',()=>{
  if(confirm('Réinitialiser toutes les cartes ?')){
    collection={}; localStorage.removeItem('collection'); updateIndex(); updateStats(); alert('Collection réinitialisée');
  }
});

document.getElementById('profile-pdp-file').addEventListener('change',function(e){
  const reader=new FileReader();
  reader.onload=function(){
    document.getElementById('profile-pdp-preview').src=reader.result;
    document.getElementById('profile-pdp-preview').style.display='block';
    updateProfileMenu();
  };
  reader.readAsDataURL(e.target.files[0]);
});
document.getElementById('profile-name').addEventListener('input',updateProfileMenu);

updateIndex(); updateStats();
document.getElementById('home-section').style.display='block';

});
</script>
</body>
</html>
